<style>
    /* --- LOGS SPECIFIC STYLES --- */
    .logs-container {
        border: 1px solid var(--card-border);
        border-radius: 12px;
        background: #ffffff;
        overflow: hidden;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    .logs-scroll-area {
        max-height: 600px;
        overflow-y: auto;
    }

    /* Custom Scrollbar for Logs */
    .logs-scroll-area::-webkit-scrollbar { width: 8px; }
    .logs-scroll-area::-webkit-scrollbar-track { background: #f8fafc; }
    .logs-scroll-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f8fafc; }
    .logs-scroll-area::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .log-item {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--card-border);
        transition: background-color 0.2s ease;
    }

    .log-item:last-child {
        border-bottom: none;
    }

    .log-item:hover {
        background-color: #f8fafc;
    }

    .log-time {
        min-width: 160px;
        font-size: 0.8rem;
        color: var(--text-muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
    }

    .log-message {
        font-size: 0.95rem;
        color: var(--text-dark);
        font-weight: 500;
        line-height: 1.5;
        flex: 1;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
        .log-item {
            flex-direction: column;
            gap: 6px;
            padding: 16px;
        }
        .log-time {
            min-width: auto;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    }
</style>

<div id="logs" class="section">
    <div style="margin-bottom: 24px;">
        <h2 style="margin: 0; font-size: 1.5rem; color: var(--text-dark); letter-spacing: -0.02em;">System Logs</h2>
        <p style="margin: 5px 0 0; color: var(--text-muted); font-size: 0.95rem;">Review real-time events, administrator actions, and system security audits.</p>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
            <h3 style="margin: 0; display: flex; align-items: center; gap: 8px; color: var(--text-dark);">
                <i data-lucide="list-video" style="color: var(--primary);"></i> Activity Feed
            </h3>
            
            <div id="log-status" style="font-size: 0.8rem; color: #10b981; display: flex; align-items: center; gap: 5px;">
                <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block;"></span>
                Live
            </div>
        </div>

        <div class="logs-container">
            <div id="log-feed" class="logs-scroll-area">
                
                {% for log in system_logs %}
                <div class="log-item">
                    <div class="log-time">
                        <i data-lucide="clock" style="width: 14px; height: 14px; color: #cbd5e1;"></i>
                        {{ log.timestamp }}
                    </div>
                    
                    <div class="log-message">
                        {{ log.message }}
                    </div>
                </div>
                {% else %}
                <div style="padding: 60px 20px; text-align: center; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <i data-lucide="inbox" style="width: 48px; height: 48px; color: #cbd5e1; margin-bottom: 12px;"></i>
                    <p style="margin: 0; font-size: 0.95rem; font-weight: 500;">No system events recorded yet.</p>
                    <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: #94a3b8;">Events will appear here automatically.</p>
                </div>
                {% endfor %}
                
            </div> </div> </div> </div> <script>
    const logFeed = document.getElementById('log-feed');
    const statusText = document.getElementById('log-status');

    // 1. Instantly snap to the newest logs on the very first page load
    if (logFeed) {
        logFeed.scrollTop = logFeed.scrollHeight;
    }

    async function fetchLogs() {
        try {
            const response = await fetch('/admin/api/logs');
            if (!response.ok) throw new Error("Backend unreachable");
            
            const data = await response.json();
            
            if (data.logs && data.logs.length > 0 && logFeed) {
                // 2. CHECK SCROLL STATE BEFORE REPLACING HTML
                // Check if the user is currently at the bottom, or if they scrolled up to read history
                const isAtBottom = (logFeed.scrollHeight - logFeed.scrollTop) <= (logFeed.clientHeight + 50);
                const currentScrollPosition = logFeed.scrollTop;

                // 3. BUILD AND REPLACE HTML
                let html = '';
                data.logs.forEach(log => {
                    html += `
                        <div class="log-item">
                            <div class="log-time">
                                <i data-lucide="clock" style="width: 14px; height: 14px; color: #cbd5e1;"></i>
                                ${log.timestamp}
                            </div>
                            <div class="log-message">
                                ${log.message}
                            </div>
                        </div>
                    `;
                });
                logFeed.innerHTML = html;
                
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }

                // 4. RESTORE SCROLL POSITION SYNCHRONOUSLY
                if (isAtBottom) {
                    // If they were at the bottom, keep snapping them to the newest logs
                    logFeed.scrollTop = logFeed.scrollHeight;
                } else {
                    // If they scrolled up to read old logs, freeze their exact position
                    logFeed.scrollTop = currentScrollPosition;
                }
            }

            if (statusText) {
                const now = new Date().toLocaleTimeString();
                statusText.innerHTML = `<span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block;"></span> Live (Updated ${now})`;
            }

        } catch (err) {
            console.error("Log Fetch Error:", err);
            if (statusText) {
                statusText.innerHTML = `<span style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: inline-block;"></span> Connection Lost`;
            }
        }
    }

    // Run the background fetch every 2 seconds
    setInterval(fetchLogs, 2000);
</script>
