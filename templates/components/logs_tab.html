<style>
    /* --- LOGS SPECIFIC STYLES --- */
    .logs-container {
        border: 1px solid var(--card-border);
        border-radius: 12px;
        background: #ffffff;
        overflow: hidden;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    .logs-scroll-area {
        max-height: 600px;
        overflow-y: auto;
    }

    /* Custom Scrollbar for Logs */
    .logs-scroll-area::-webkit-scrollbar { width: 8px; }
    .logs-scroll-area::-webkit-scrollbar-track { background: #f8fafc; }
    .logs-scroll-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f8fafc; }
    .logs-scroll-area::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .log-item {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--card-border);
        transition: background-color 0.2s ease;
    }

    .log-item:last-child {
        border-bottom: none;
    }

    .log-item:hover {
        background-color: #f8fafc;
    }

    .log-time {
        min-width: 160px;
        font-size: 0.8rem;
        color: var(--text-muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
    }

    .log-message {
        font-size: 0.95rem;
        color: var(--text-dark);
        font-weight: 500;
        line-height: 1.5;
        flex: 1;
    }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 768px) {
        .log-item {
            flex-direction: column;
            gap: 6px;
            padding: 16px;
        }
        .log-time {
            min-width: auto;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    }
</style>

<div id="logs" class="section">
    <div style="margin-bottom: 24px;">
        <h2 style="margin: 0; font-size: 1.5rem; color: var(--text-dark); letter-spacing: -0.02em;">System Logs</h2>
        <p style="margin: 5px 0 0; color: var(--text-muted); font-size: 0.95rem;">Review real-time events, administrator actions, and system security audits.</p>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
            <h3 style="margin: 0; display: flex; align-items: center; gap: 8px; color: var(--text-dark);">
                <i data-lucide="list-video" style="color: var(--primary);"></i> Activity Feed
            </h3>
            
            <div id="log-status" style="font-size: 0.8rem; color: #10b981; display: flex; align-items: center; gap: 5px;">
                <span style="width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; display: inline-block;"></span>
                Connecting...
            </div>
        </div>

        <div class="logs-container">
            <div id="log-feed" class="logs-scroll-area">
                
                {% for log in system_logs %}
                <div class="log-item">
                    <div class="log-time">
                        <i data-lucide="clock" style="width: 14px; height: 14px; color: #cbd5e1;"></i>
                        {{ log.timestamp }}
                    </div>
                    <div class="log-message">
                        {{ log.message }}
                    </div>
                </div>
                {% else %}
                <div style="padding: 60px 20px; text-align: center; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <i data-lucide="inbox" style="width: 48px; height: 48px; color: #cbd5e1; margin-bottom: 12px;"></i>
                    <p style="margin: 0; font-size: 0.95rem; font-weight: 500;">No system events recorded yet.</p>
                    <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: #94a3b8;">Events will appear here automatically.</p>
                </div>
                {% endfor %}
                
            </div> 
        </div> 
    </div> 
</div> 

<script>
    const logFeed = document.getElementById('log-feed');
    const statusText = document.getElementById('log-status');
    let isUserScrolling = false;

    // Detect if the admin scrolled DOWN to read older history
    if (logFeed) {
        logFeed.addEventListener('scroll', () => {
            // If they are within 50px of the top, they aren't reading old logs
            const isAtTop = logFeed.scrollTop <= 50;
            isUserScrolling = !isAtTop;
        });
    }

    function connectLogStream() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/admin/ws/logs`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            statusText.innerHTML = `<span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981;"></span> Live Stream Connected`;
            if (logFeed) logFeed.innerHTML = ""; 
        };

        ws.onmessage = (event) => {
            const log = JSON.parse(event.data);
            
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            
            // Dynamic coloring based on log type
            let iconColor = "#cbd5e1"; // Default Gray
            
            if (log.type === "SECURITY_ALERT") iconColor = "#ef4444"; // Red
            else if (log.type === "PORTAL_EVENT") iconColor = "#3b82f6"; // Blue
            else if (log.type === "ADMIN_AUDIT") iconColor = "#f59e0b"; // Orange
            else if (log.type === "COIN_INSERT" || log.type === "COIN_SUCCESS") iconColor = "#10b981"; // Emerald Green
            else if (log.type === "WARNING") iconColor = "#eab308"; // Amber/Yellow
            else if (log.type === "CRITICAL") iconColor = "#b91c1c"; // Dark Red

            logItem.innerHTML = `
                <div class="log-time">
                    <i data-lucide="clock" style="width: 14px; height: 14px; color: ${iconColor};"></i>
                    ${log.timestamp}
                </div>
                <div class="log-message">
                    <span style="font-size: 0.75rem; font-weight: 700; color: ${iconColor}; margin-right: 8px;">[${log.type}]</span>
                    ${log.message}
                </div>
            `;
            
            // 1. ADD TO THE TOP
            logFeed.prepend(logItem);

            // 2. REMOVE FROM THE BOTTOM
            if (logFeed.children.length > 150) {
                logFeed.removeChild(logFeed.lastChild);
            }

            if (typeof lucide !== 'undefined') {
                lucide.createIcons({ root: logItem });
            }

            // 3. AUTO-SCROLL TO THE TOP
            if (!isUserScrolling) {
                logFeed.scrollTop = 0;
            }
        };

        ws.onclose = () => {
            statusText.innerHTML = `<span style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: inline-block;"></span> Connection Lost. Reconnecting...`;
            setTimeout(connectLogStream, 3000); 
        };
        
        ws.onerror = () => {
            ws.close();
        };
    }

    connectLogStream();
</script>
